{% extends 'base.html' %}

{% block content %}
<div class="dashboard-grid">
    <div class="analytics-panel">
        <h3>Analytics</h3>
        <hr style="margin: 1rem 0; border: none; border-top: 1px solid var(--border);">
        <div class="metric">
            <div class="metric-title">Total Tasks</div>
            <div class="metric-value" id="stat-total">0</div>
        </div>
        <div class="metric">
            <div class="metric-title">Completed</div>
            <div class="metric-value" id="stat-completed" style="color: var(--success)">0</div>
        </div>
        <div class="metric">
            <div class="metric-title">Pending</div>
            <div class="metric-value" id="stat-pending" style="color: var(--warning)">0</div>
        </div>
        <div class="metric">
            <div class="metric-title">Completion Rate</div>
            <div class="metric-value" id="stat-percent">0%</div>
        </div>
    </div>

    <div class="task-list-panel">
        <form class="add-task-form" id="addTaskForm">
            <div class="form-group full-width">
                <label>Title</label>
                <input type="text" id="taskTitle" class="form-control" required placeholder="What needs to be done?">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="taskDesc" class="form-control" placeholder="Optional details">
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriority" class="form-control">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            <div class="form-group full-width">
                <button type="submit" class="btn btn-primary">Add Task</button>
            </div>
        </form>

        <h3>Your Tasks</h3>
        <div id="taskList" style="margin-top: 1rem;">
            <!-- Task items injected here via JS -->
            <p style="color: var(--text-muted)">Loading tasks...</p>
        </div>
    </div>
</div>

<div id="toast">Task Updated</div>
{% endblock %}

{% block scripts %}
<script>
    const socket = io();

    socket.on('task_updated', (data) => {
        // Simple check. In production, room-based broadcast is better.
        // We will just re-fetch tasks and analytics to keep it simple.
        fetchData();
        showToast(data.message || 'Task Updated');
    });

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function fetchData() {
        await Promise.all([fetchTasks(), fetchAnalytics()]);
    }

    async function fetchTasks() {
        const res = await fetch('/api/tasks');
        const json = await res.json();
        
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        
        if (json.status === 'success') {
            if (json.data.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted)">No tasks found. Create one above!</p>';
                return;
            }
            json.data.forEach(task => {
                const item = document.createElement('div');
                item.className = 'task-item';
                
                let badgeClass = 'badge-pending';
                if (task.status === 'In Progress') badgeClass = 'badge-progress';
                if (task.status === 'Completed') badgeClass = 'badge-completed';

                item.innerHTML = `
                    <div class="task-details">
                        <h4>${task.title} <span class="badge ${badgeClass}">${task.status}</span></h4>
                        <p>${task.description || ''} | Priority: <strong>${task.priority}</strong></p>
                    </div>
                    <div class="task-actions">
                        <select onchange="updateTaskStatus(${task.id}, this.value)" class="form-control" style="width: auto; padding: 0.25rem;">
                            <option value="Pending" ${task.status === 'Pending' ? 'selected' : ''}>Pending</option>
                            <option value="In Progress" ${task.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                            <option value="Completed" ${task.status === 'Completed' ? 'selected' : ''}>Completed</option>
                        </select>
                        <button onclick="deleteTask(${task.id})" class="btn btn-danger">Delete</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }
    }

    async function fetchAnalytics() {
        const res = await fetch('/api/analytics');
        const json = await res.json();
        if (json.status === 'success') {
            document.getElementById('stat-total').innerText = json.data.total;
            document.getElementById('stat-completed').innerText = json.data.completed;
            document.getElementById('stat-pending').innerText = json.data.pending;
            document.getElementById('stat-percent').innerText = json.data.completion_percentage + '%';
        }
    }

    document.getElementById('addTaskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('taskTitle').value;
        const description = document.getElementById('taskDesc').value;
        const priority = document.getElementById('taskPriority').value;

        const res = await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description, priority, status: 'Pending' })
        });
        if(res.ok) {
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            // Event will be triggered via websocket, but we can also manually call fetchData()
            // if we prefer, but let's rely on websocket for real-time magic!
        }
    });

    async function updateTaskStatus(id, status) {
        // For partial update, we still need to send all fields or change backend. 
        // Our backend expects title, desc, etc., so we must fetch the task or make backend handle partial.
        // Let's modify backend or just fetch the tasks from the dom state.
        // Actually, backend expects title, description, priority, status in PUT.
        // Instead of a full update, I can just modify the backend to accept partial updates, 
        // but let's just make it simple: the update endpoint requires them. Wait, let me modify backend via a separate tool call if needed.
        // Let's just fetch the current task data from backend first...
        
        const res = await fetch('/api/tasks');
        const json = await res.json();
        const task = json.data.find(t => t.id === id);
        if(!task) return;

        await fetch('/api/tasks/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title: task.title,
                description: task.description,
                priority: task.priority,
                status: status
            })
        });
    }

    async function deleteTask(id) {
        if(confirm('Are you sure you want to delete this task?')) {
            await fetch('/api/tasks/' + id, { method: 'DELETE' });
        }
    }

    // Initial load
    fetchData();
</script>
{% endblock %}
